<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nanobot 🐈</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 24px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header .status { font-size: 12px; color: #53d769; }
  header .spacer { flex: 1; }
  header .session-select {
    display: flex; align-items: center; gap: 8px;
  }
  header select {
    background: #1a1a2e;
    color: #eee;
    border: 1px solid #0f3460;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  header select:focus { border-color: #e94560; }
  header label { font-size: 13px; color: #aaa; }
  .tab-bar {
    display: flex;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
  }
  .tab {
    padding: 8px 20px;
    font-size: 13px;
    cursor: pointer;
    color: #888;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab:hover { color: #ccc; }
  .tab.active { color: #e94560; border-bottom-color: #e94560; }
  #chat-panel, #history-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #history-panel { display: none; }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #0f3460;
    border-bottom-right-radius: 4px;
  }
  .msg.bot, .msg.assistant {
    align-self: flex-start;
    background: #222;
    border-bottom-left-radius: 4px;
  }
  .msg.tool {
    align-self: flex-start;
    background: #1a2a1a;
    border-left: 3px solid #53d769;
    font-family: "SF Mono", Monaco, Menlo, monospace;
    font-size: 12px;
    max-height: 200px;
    overflow-y: auto;
    color: #aaa;
  }
  .msg .time {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
  }
  .msg .role-tag {
    font-size: 11px;
    color: #e94560;
    font-weight: 600;
    margin-bottom: 4px;
  }
  #input-area {
    padding: 16px 24px;
    background: #16213e;
    border-top: 1px solid #0f3460;
    display: flex;
    gap: 12px;
  }
  #input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #0f3460;
    border-radius: 24px;
    background: #1a1a2e;
    color: #eee;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
  }
  #input:focus { border-color: #e94560; }
  #input::placeholder { color: #666; }
  #send {
    padding: 12px 24px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 24px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
  }
  #send:hover { background: #c73652; }
  #send:disabled { background: #555; cursor: not-allowed; }
  .typing-indicator span {
    display: inline-block;
    width: 8px; height: 8px;
    background: #888;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
    margin-right: 4px;
  }
  .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
  .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .history-info {
    text-align: center;
    color: #666;
    font-size: 13px;
    padding: 8px;
  }
  .refresh-btn {
    background: #0f3460;
    color: #ccc;
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .refresh-btn:hover { background: #1a4a8a; }
</style>
</head>
<body>
<header>
  <h1>🐈 nanobot</h1>
  <span class="status">● online</span>
  <span class="spacer"></span>
  <div class="session-select">
    <label>Session:</label>
    <select id="session-select"></select>
    <button class="refresh-btn" onclick="loadSessions()">↻</button>
  </div>
</header>
<div class="tab-bar">
  <div class="tab active" data-tab="chat" onclick="switchTab('chat')">💬 聊天</div>
  <div class="tab" data-tab="history" onclick="switchTab('history')">📜 会话历史</div>
</div>
<div id="chat-panel"></div>
<div id="history-panel"></div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="输入消息..." autofocus></textarea>
  <button id="send">发送</button>
</div>
<script>
const chatPanel = document.getElementById('chat-panel');
const historyPanel = document.getElementById('history-panel');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const sessionSelect = document.getElementById('session-select');

let currentTab = 'chat';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  chatPanel.style.display = tab === 'chat' ? 'flex' : 'none';
  historyPanel.style.display = tab === 'history' ? 'flex' : 'none';
  document.getElementById('input-area').style.display = tab === 'chat' ? 'flex' : 'none';
  if (tab === 'history') loadHistory();
}

function addMsg(container, text, cls, time) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  if (time) {
    const t = document.createElement('div');
    t.className = 'time';
    t.textContent = time;
    div.appendChild(t);
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  chatPanel.appendChild(div);
  chatPanel.scrollTop = chatPanel.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  addMsg(chatPanel, text, 'user');
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  showTyping();
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    removeTyping();
    addMsg(chatPanel, data.reply || '(无回复)', 'bot');
  } catch (e) {
    removeTyping();
    addMsg(chatPanel, '⚠️ 连接错误: ' + e.message, 'bot');
  }
  sendBtn.disabled = false;
  input.focus();
}

async function loadSessions() {
  try {
    const res = await fetch('/sessions');
    const data = await res.json();
    sessionSelect.innerHTML = '';
    data.sessions.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      sessionSelect.appendChild(opt);
    });
    // Default to cli_direct
    if (data.sessions.includes('cli_direct')) {
      sessionSelect.value = 'cli_direct';
    }
  } catch (e) {
    console.error('Failed to load sessions', e);
  }
}

function cleanContent(content) {
  // Remove [Runtime Context] blocks
  return content.replace(/\n?\[Runtime Context\][\s\S]*?Chat ID: \S+/g, '').trim();
}

async function loadHistory() {
  const session = sessionSelect.value;
  if (!session) return;
  historyPanel.innerHTML = '<div class="history-info">加载中...</div>';
  try {
    const res = await fetch('/history?session=' + encodeURIComponent(session));
    const data = await res.json();
    historyPanel.innerHTML = '';
    if (data.messages.length === 0) {
      historyPanel.innerHTML = '<div class="history-info">暂无消息</div>';
      return;
    }
    const info = document.createElement('div');
    info.className = 'history-info';
    info.textContent = `${session} — ${data.messages.length} 条消息`;
    historyPanel.appendChild(info);

    data.messages.forEach(msg => {
      const role = msg.role;
      const content = cleanContent(msg.content || '');
      if (!content) return;
      const time = msg.timestamp ? msg.timestamp.replace('T', ' ').substring(0, 19) : '';
      
      if (role === 'user') {
        addMsg(historyPanel, content, 'user', time);
      } else if (role === 'assistant') {
        addMsg(historyPanel, content, 'assistant', time);
      } else if (role === 'tool') {
        // Truncate long tool output
        const truncated = content.length > 500 ? content.substring(0, 500) + '\n... (truncated)' : content;
        addMsg(historyPanel, '🔧 ' + truncated, 'tool', time);
      }
    });
    historyPanel.scrollTop = historyPanel.scrollHeight;
  } catch (e) {
    historyPanel.innerHTML = '<div class="history-info">⚠️ 加载失败: ' + e.message + '</div>';
  }
}

sessionSelect.addEventListener('change', () => {
  if (currentTab === 'history') loadHistory();
});

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Init
addMsg(chatPanel, '你好！我是 nanobot 🐈，有什么可以帮你的？', 'bot');
loadSessions();
</script>
</body>
</html>
